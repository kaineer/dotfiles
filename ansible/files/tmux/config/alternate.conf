### terminal
set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ',xterm-256color:RGB'

### bindings
## prefix

unbind C-b
set-option -g prefix C-space

## reload
bind-key r source ~/.tmux.conf

## navigation
# * https://github.com/christoomey/vim-tmux-navigator
#
## in vim?
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

# Move between panes/VIM splits
#
bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h'  'select-pane -L'
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j'  'select-pane -D'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k'  'select-pane -U'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l'  'select-pane -R'

# Move to previous pane/VIM split
#
bind-key -n 'M-o' if-shell "$is_vim" 'send-keys M-o'  'select-pane -l'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'M-h' select-pane -L
bind-key -T copy-mode-vi 'M-j' select-pane -D
bind-key -T copy-mode-vi 'M-k' select-pane -U
bind-key -T copy-mode-vi 'M-l' select-pane -R

### Status
set -g status-position top
set -g status-left-length 100

set -g status-style "fg=${snow_100},bg=${night_400}"
set -g status-left "#[fg=${frost_100}]${terminal_02} #[fg=${aurora_green}]#S#[fg=${snow_100}] ${small_dot} "
set -g window-status-current-format "#[fg=${aurora_yellow},underscore]#I:#W"
set -g window-status-format "#[fg=${night_100}]#I:#W"

### Splits
bind-key C-j split -v
bind-key C-l split -h
bind-key C-w kill-pane
bind-key C-space rotate-window

bind-key j choose-tree -Z

set -g pane-border-lines heavy
set -g pane-border-status off

set -g automatic-rename off
